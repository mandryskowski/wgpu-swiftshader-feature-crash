name: Build and Run with SwiftShader

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-repro:
    name: Run Repro on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            python3 \
            libx11-dev \
            libxext-dev \
            libvulkan1 \
            vulkan-tools

      - name: Build SwiftShader
        run: |
          cd swiftshader
          mkdir -p build
          cd build
          # Generate build files using Ninja for speed
          cmake -G Ninja ..
          # Build the Vulkan ICD
          ninja

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Cargo
        run: cargo run
        env:
          VK_ICD_FILENAMES: ${{ github.workspace }}/swiftshader/build/Linux/vk_swiftshader_icd.json
          RUST_BACKTRACE: 1
          RUST_LOG: info,wgpu=warn